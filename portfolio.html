<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポートフォリオ - 名前</title> 
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="index.css">
</head>
<body>

<!-- 左上固定メニュー -->
<nav id="side-menu" aria-label="メインメニュー">
  <a class="menu-btn" href="index.html">プロフィール</a>
  <a class="menu-btn" href="portfolio.html">ポートフォリオ</a>
</nav>

<div id="outer">
  <div id="header">
    <h1 class="px"><strong>KaitoFMS</strong></h1> 
  </div>


  <div id="bgc"><div id="bgc-inner"><p class="oft" style="color:#fff;"></p></div></div>

  <div id="content">
    <div class="inner"> 
      <h2 class="reveal">ポートフォリオ</h2>
      <div class="portfolio">
        <div class="work reveal">
          <img src="Mouse_Trolley.png" alt="Mouse Trolley"> 
          <h3><strong>Mouse Trolley</strong></h3>
          <a href="https://kaitofms.github.io/Mouse_Trolley/" target="_blank" rel="noopener",class="test-centered-text">作品を見る</a> 
        </div>
        <div class="work reveal">
          <img src="fractal.png" alt="Fractal_Sierpinski_3D"> 
          <h3><strong>Fractal_Sierpinski_3D</strong></h3>
          <a href="https://kaitofms.github.io/Fractal_Sierpinski_3D/" target="_blank" rel="noopener">作品を見る</a>
        </div>
        <div class="work reveal">
          <img src="Noise.png" alt="作品3のサムネイル"> 
          <h3><strong>Noise_Art_3D</strong></h3> 
          <a href="https://kaitofms.github.io/Noise_Art_3D/" target="_blank" rel="noopener">作品を見る</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const path = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('#side-menu a').forEach(a=>{
    if (a.getAttribute('href') === path) a.setAttribute('aria-current','page');
  });
    (function(){
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('is-in'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(ent => {
        if (ent.isIntersecting) {
          ent.target.classList.add('is-in');
          io.unobserve(ent.target);  // 一度だけ出す派
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -10% 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  })();
</script>
</body>
</html>
